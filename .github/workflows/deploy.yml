name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Gate 1: TypeScript typecheck. Blocking — if types break, we do not deploy.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # Gate 2: Vitest suite. Runs in parallel with typecheck.
  # TODO: remove `continue-on-error` once the 4 failing tests are green.
  # Snapshot 2026-04-20 local run: 4 failed / 3834 passed / 8 skipped.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run vitest
        run: npx vitest run
        continue-on-error: true

  # Build + deploy only runs if typecheck passed. `test` is not a hard gate
  # yet (continue-on-error) but appears in the dependency chain so its status
  # is visible on every deploy.
  build-and-deploy:
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTO_LOGIN_EMAIL: ${{ secrets.VITE_AUTO_LOGIN_EMAIL }}
          VITE_AUTO_LOGIN_PASSWORD: ${{ secrets.VITE_AUTO_LOGIN_PASSWORD }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
